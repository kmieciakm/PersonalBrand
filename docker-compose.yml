version: '3.4'

services:
  personalbrand:
    container_name: personalbrand
    image: ${DOCKER_REGISTRY-}personalbrand
    build:
      context: .
      dockerfile: PersonalBrand/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=https://+:443;http://+:80
      - Kestrel__Certificates__Default__Path=/root/.aspnet/https/${CERTIFICATE}
      - Kestrel__Certificates__Default__Password=${CERTIFICATE_PASSWORD}
    networks:
      - personalbrand-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${APPDATA}/Microsoft/UserSecrets:/root/.microsoft/usersecrets:ro
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro

networks:
  personalbrand-network: